repos:
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        args:
          - --in-place
          - --remove-all-unused-imports
          - --remove-unused-variables
          - --expand-star-imports
          - --recursive
        exclude: ^(src/tests/|src/shared/infrastructure/repositories/Decorators/|src/shared/application/usecases/Decorators/|migrations/)
        files: ^src/


  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort (python)
        args: ["--profile", "black", "--filter-files"]
        files: ^src/

  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length", "88"]
        files: ^src/

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ["--max-line-length=88", "--extend-ignore=E203,W503"]
        files: ^src/
        exclude: ^(src/tests/|src/shared/infrastructure/repositories/Decorators/)

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        args: [ "--ignore-missing-imports", "--follow-imports=silent"]
        additional_dependencies: [ pydantic, sqlalchemy, pyside6 ]
        files: ^src/
        exclude: ^(src/tests/|src/shared/infrastructure/repositories/Decorators/)